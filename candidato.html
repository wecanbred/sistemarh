<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Carreiras - CoreHR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- BARRA SUPERIOR -->
    <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center shadow-sm">
        <!-- Logo agora é um link clicável que aponta para o index.html -->
        <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity cursor-pointer">
            <i data-lucide="rocket" class="text-blue-600 w-6 h-6"></i>
            <span class="text-xl font-bold text-gray-900 tracking-tight">CoreHR <span class="text-blue-600 font-medium text-sm">Carreiras</span></span>
        </a>
        <div id="header-user-actions"></div>
    </header>
    
    <main class="flex-1 p-6 max-w-6xl w-full mx-auto my-4">
        
        <!-- SEÇÃO DE AUTENTICAÇÃO (LOGIN / CADASTRO) -->
        <div id="area-autenticacao" class="max-w-2xl w-full mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-md space-y-6 my-6">
            <div class="flex border-b border-gray-200 pb-3">
                <button onclick="alternarAbasAuth('login')" id="tab-login" class="flex-1 text-center font-bold text-sm text-blue-600 border-b-2 border-blue-600 pb-2">Já tenho cadastro</button>
                <button onclick="alternarAbasAuth('cadastro')" id="tab-cadastro" class="flex-1 text-center font-bold text-sm text-gray-400 pb-2 hover:text-gray-600">Criar Nova Conta (Completa)</button>
            </div>

            <!-- FORMULÁRIO DE LOGIN -->
            <form id="form-login" onsubmit="loginCandidato(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">E-mail</label>
                    <input type="email" id="login-email" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Senha</label>
                    <input type="password" id="login-senha" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors">Entrar</button>
            </form>

            <!-- FORMULÁRIO DE CADASTRO EXPANDIDO (TRIAGEM COMPLETA + eSOCIAL) -->
            <form id="form-cadastro" onsubmit="registrarCandidato(event)" class="hidden space-y-6">
                
                <!-- Dados de Acesso -->
                <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 space-y-3">
                    <h4 class="font-bold text-xs text-blue-900 uppercase tracking-wider">Dados de Acesso</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">E-mail Comercial</label>
                            <input type="email" id="cad-email" required class="w-full text-sm px-3 py-2 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Defina uma Senha</label>
                            <input type="password" id="cad-senha" required class="w-full text-sm px-3 py-2 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </div>

                <!-- Dados Pessoais Estruturados -->
                <div class="space-y-3">
                    <h4 class="font-bold text-xs text-gray-400 uppercase tracking-wider border-b pb-1">Identificação Pessoal</h4>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Nome Completo</label>
                        <input type="text" id="cad-nome" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">CPF (Apenas números)</label>
                            <input type="text" id="cad-cpf" maxlength="11" required placeholder="00000000000" class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">RG</label>
                            <input type="text" id="cad-rg" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">PIS / NIS</label>
                            <input type="text" id="cad-pis" placeholder="Opcional na triagem" class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Telefone Celular</label>
                            <input type="text" id="cad-tel" required placeholder="(11) 99999-9999" class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Gênero</label>
                            <select id="cad-genero" class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg bg-white outline-none">
                                <option>Masculino</option>
                                <option>Feminino</option>
                                <option>Não Informar</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Raça / Etnia (eSocial)</label>
                            <select id="cad-raca" class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg bg-white outline-none">
                                <option>Branca</option>
                                <option>Preta</option>
                                <option>Parda</option>
                                <option>Amarela</option>
                                <option>Indígena</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Endereço Residencial -->
                <div class="space-y-3">
                    <h4 class="font-bold text-xs text-gray-400 uppercase tracking-wider border-b pb-1">Endereço Residencial</h4>
                    <div class="grid grid-cols-4 gap-3">
                        <div class="col-span-3">
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Logradouro (Rua/Avenida)</label>
                            <input type="text" id="cad-rua" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Nº</label>
                            <input type="text" id="cad-num" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Bairro</label>
                            <input type="text" id="cad-bairro" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Cidade</label>
                            <input type="text" id="cad-cidade" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">CEP</label>
                            <input type="text" id="cad-cep" required placeholder="00000-000" class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </div>

                <!-- Experiências -->
                <div class="space-y-3">
                    <h4 class="font-bold text-xs text-gray-400 uppercase tracking-wider border-b pb-1">Histórico e Perfil</h4>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Resumo das Últimas Experiências Profissionais</label>
                        <textarea id="cad-resumo" rows="4" required placeholder="Descreva os cargos anteriores, empresas e tempo de permanência..." class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors shadow">Finalizar Cadastro Completo</button>
            </form>
        </div>

        <!-- PAINEL DE VAGAS INTEGRADO (APARECE APÓS LOGIN) -->
        <div id="portal-vagas-logado" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                    <i data-lucide="briefcase" class="w-5 h-5 text-blue-600"></i> Oportunidades Disponíveis
                </h2>
                <div id="lista-vagas-cards" class="space-y-3"></div>
            </div>
            <div id="portal-detalhe-vaga" class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm sticky top-6">
                <div id="detalhe-conteudo"></div>
            </div>
        </div>

    </main>

    <script>
        const bancoVagas = [
            { id: 101, titulo: "Analista de Logística Onsite", setor: "Operações - Shopee", local: "São Paulo - SP", modelo: "Presencial", desc: "Acompanhamento in loco das rotinas de triagem, expedição e monitoramento de KPIs dentro do HUB.", req: "Excel avançado, boa comunicação e flexibilidade de horários." },
            { id: 102, titulo: "Supervisor de Transportes", setor: "Malha Logística", local: "Rio de Janeiro - RJ", modelo: "Presencial", desc: "Gestão de frotas agregadas, roteirização de última milha e controle operacional.", req: "Superior em Logística ou áreas correlatas, e liderança de times." }
        ];

        let candidatoLogado = null;

        // Inicializador do banco unificado no localStorage
        if(!localStorage.getItem('corehr_candidatos')) {
            localStorage.setItem('corehr_candidatos', JSON.stringify([]));
        }

        window.onload = function() {
            lucide.createIcons();
            renderizarAcoesHeader();
        };

        function alternarAbasAuth(aba) {
            const formL = document.getElementById('form-login');
            const formC = document.getElementById('form-cadastro');
            const tabL = document.getElementById('tab-login');
            const tabC = document.getElementById('tab-cadastro');

            if(aba === 'login') {
                formL.classList.remove('hidden');
                formC.classList.add('hidden');
                tabL.className = "flex-1 text-center font-bold text-sm text-blue-600 border-b-2 border-blue-600 pb-2";
                tabC.className = "flex-1 text-center font-bold text-sm text-gray-400 pb-2 hover:text-gray-600";
            } else {
                formL.classList.add('hidden');
                formC.classList.remove('hidden');
                tabC.className = "flex-1 text-center font-bold text-sm text-blue-600 border-b-2 border-blue-600 pb-2";
                tabL.className = "flex-1 text-center font-bold text-sm text-gray-400 pb-2 hover:text-gray-600";
            }
        }

        function registrarCandidato(e) {
            e.preventDefault();
            const cpf = document.getElementById('cad-cpf').value;
            if(cpf.length !== 11 || isNaN(cpf)) { return alert("O CPF deve conter exatamente 11 números."); }

            const lista = JSON.parse(localStorage.getItem('corehr_candidatos'));
            
            const novo = {
                email: document.getElementById('cad-email').value,
                senha: document.getElementById('cad-senha').value,
                nome: document.getElementById('cad-nome').value,
                cpf: cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4"),
                rg: document.getElementById('cad-rg').value,
                pis: document.getElementById('cad-pis').value || 'Não informado',
                tel: document.getElementById('cad-tel').value,
                genero: document.getElementById('cad-genero').value,
                raca: document.getElementById('cad-raca').value,
                endereco: `${document.getElementById('cad-rua').value}, Nº ${document.getElementById('cad-num').value} - ${document.getElementById('cad-bairro').value}, ${document.getElementById('cad-cidade').value} (CEP: ${document.getElementById('cad-cep').value})`,
                resumo: document.getElementById('cad-resumo').value,
                vagasInscritas: []
            };

            if(lista.find(c => c.email === novo.email)) { return alert("Este e-mail já está cadastrado."); }

            lista.push(novo);
            localStorage.setItem('corehr_candidatos', JSON.stringify(lista));
            alert("Cadastro mestre realizado com sucesso!");
            alternarAbasAuth('login');
            document.getElementById('login-email').value = novo.email;
        }

        function loginCandidato(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            const lista = JSON.parse(localStorage.getItem('corehr_candidatos'));

            const usuario = lista.find(c => c.email === email && c.senha === senha);
            if(!usuario) { return alert("E-mail ou senha incorretos."); }

            candidatoLogado = usuario;
            document.getElementById('area-autenticacao').classList.add('hidden');
            document.getElementById('portal-vagas-logado').classList.remove('hidden');
            
            renderizarAcoesHeader();
            renderizarVagas();
            exibirInstrucaoSelecao();
        }

        function renderizarAcoesHeader() {
            const h = document.getElementById('header-user-actions');
            if(candidatoLogado) {
                h.innerHTML = `<div class="flex items-center gap-3 text-sm"><span>Olá, <strong>${candidatoLogado.nome}</strong></span><button onclick="logout()" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg">Sair</button></div>`;
            } else {
                h.innerHTML = `<span class="text-xs text-amber-600 bg-amber-50 px-3 py-1.5 border border-amber-200 rounded-full font-medium">Fase de Captação Externa</span>`;
            }
        }

        function renderizarVagas() {
            const container = document.getElementById('lista-vagas-cards');
            container.innerHTML = '';
            bancoVagas.forEach(v => {
                const inscrito = candidatoLogado.vagasInscritas.includes(v.id);
                container.innerHTML += `
                    <div onclick="verDetalheVaga(${v.id})" class="bg-white p-5 rounded-xl border border-gray-200 hover:border-blue-500 shadow-sm transition-all cursor-pointer flex justify-between items-center">
                        <div>
                            <span class="text-[10px] font-bold text-blue-700 bg-blue-50 px-2 py-0.5 rounded uppercase">${v.setor}</span>
                            <h3 class="font-bold text-gray-900 text-base mt-1.5">${v.titulo}</h3>
                            <p class="text-xs text-gray-500 mt-1">${v.local} • ${v.modelo}</p>
                        </div>
                        <div>${inscrito ? `<span class="text-xs bg-green-100 text-green-700 font-semibold px-3 py-1 rounded-full">Candidatado</span>` : `<i data-lucide="chevron-right" class="text-gray-400"></i>`}</div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function exibirInstrucaoSelecao() {
            document.getElementById('detalhe-conteudo').innerHTML = `<div class="text-center py-12 text-gray-400"><p class="text-sm">Selecione uma oportunidade ao lado para ver os detalhes e se candidatar.</p></div>`;
        }

        function verDetalheVaga(idVaga) {
            const v = bancoVagas.find(x => x.id === idVaga);
            const inscrito = candidatoLogado.vagasInscritas.includes(idVaga);
            document.getElementById('detalhe-conteudo').innerHTML = `
                <div class="space-y-4">
                    <h3 class="font-bold text-gray-900 text-lg">${v.titulo}</h3>
                    <p class="text-xs text-gray-500">${v.local} (${v.modelo})</p>
                    <p class="text-sm text-gray-600 leading-relaxed"><strong>Descrição:</strong> ${v.desc}</p>
                    <p class="text-sm text-gray-600 leading-relaxed"><strong>Requisitos:</strong> ${v.req}</p>
                    <div class="pt-2">
                        ${inscrito ? `<button disabled class="w-full bg-gray-100 text-gray-400 py-2.5 rounded-lg text-sm cursor-not-allowed">Inscrição Concluída</button>` : `<button onclick="inscreverNaVaga(${v.id})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors shadow">Confirmar Candidatura</button>`}
                    </div>
                </div>
            `;
        }

        function inscreverNaVaga(idVaga) {
            const lista = JSON.parse(localStorage.getItem('corehr_candidatos'));
            const idx = lista.findIndex(c => c.email === candidatoLogado.email);
            
            lista[idx].vagasInscritas.push(idVaga);
            localStorage.setItem('corehr_candidatos', JSON.stringify(lista));
            candidatoLogado = lista[idx];
            
            alert("Inscrição efetuada com sucesso!");
            renderizarVagas();
            verDetalheVaga(idVaga);
        }

        function logout() {
            candidatoLogado = null;
            document.getElementById('area-autenticacao').classList.remove('hidden');
            document.getElementById('portal-vagas-logado').classList.add('hidden');
            renderizarAcoesHeader();
        }
    </script>
</body>
</html>
